<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasar Teknik Komputer dan Jaringan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Mengatur reset dasar dan background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            position: relative;
        }

        /* Overlay gelap agar teks lebih terbaca */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 10, 30, 0.7); 
            z-index: -1;
        }

        /* Efek Teks Neon */
        .title {
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            font-size: 2.2rem;
            line-height: 1.1;
            letter-spacing: 2px;
            color: transparent;
            -webkit-text-stroke: 1px #00f3ff; 
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5); 
            margin-bottom: 30px;
        }

        /* Efek Kartu Kaca (Glassmorphism) Utama */
        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Tombol Menu di dalam Kartu */
        .menu-item {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid #00f3ff; 
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .menu-item:hover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5), inset 0 0 15px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        .menu-item i {
            font-size: 3rem;
            color: white;
        }

        .menu-item span {
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Label kecil "Learn More" khusus di kotak jaringan */
        .learn-more {
            font-size: 0.7rem !important;
            background: rgba(255,255,255,0.2);
            padding: 3px 10px;
            border-radius: 10px;
            margin-top: -5px;
        }

        /* Efek Kartu Kaca untuk Sosial Media (Bawah) */
        .social-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 15px 30px;
            display: flex;
            flex-wrap: wrap; /* Menjaga agar turun ke bawah jika layar HP terlalu kecil */
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-glass a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
            display: flex; /* Membuat icon dan teks sejajar */
            align-items: center;
            gap: 10px; /* Jarak antara icon dan teks */
        }

        .social-glass a i {
            font-size: 1.5rem; /* Ukuran khusus untuk icon */
        }

        .social-glass a span {
            font-size: 1rem; /* Ukuran khusus untuk teks MEGAH GLORY */
            font-weight: 600;
            letter-spacing: 1px;
        }

        .social-glass a:hover {
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff;
        }
    </style>
</head>
<body>

    <h1 class="title">DASAR DASAR<br>TEKNIK KOMPUTER<br>DAN JARINGAN</h1>

    <div class="glass-container">
        <a href="#" class="menu-item">
            <i class="fas fa-print"></i>
            <span>Printers</span>
        </a>
        
        <a href="#" class="menu-item">
            <i class="fas fa-desktop"></i>
            <span>KOMPUTER</span>
        </a>

        <a href="#" class="menu-item">
            <i class="fas fa-wifi"></i>
            <span>JARINGAN</span>
            <span class="learn-more">Learn More</span>
        </a>
    </div>

    <div class="social-glass">
        <a href="https://www.instagram.com/cvmegahglory?igsh=OXpncXh5cmFuMTVv" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
            <span>MEGAH GLORY</span>
        </a>
        <a href="https://www.tiktok.com/@megahglory?_r=1&_t=ZS-94R5hUSPPc5" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-tiktok"></i>
            <span>MEGAH GLORY</span>
        </a>
    </div>

</body>
</html>
